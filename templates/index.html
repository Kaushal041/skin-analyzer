<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Skin Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Skin Analyzer</h1>
            <p>Get professional skin insights instantly</p>
        </header>

        <main>
            <div class="upload-section">
                <div class="input-group">
                    <label for="file-input" class="btn-secondary">Upload Image</label>
                    <input type="file" id="file-input" accept="image/*" hidden>

                    <button id="camera-btn" class="btn-secondary">Use Camera</button>
                </div>

                <div id="camera-container" class="hidden">
                    <video id="video" autoplay playsinline></video>
                    <button id="capture-btn" class="btn-primary">Capture Photo</button>
                </div>

                <div id="preview-container" class="hidden">
                    <img id="image-preview" src="" alt="Skin preview">
                    <button id="analyze-btn" class="btn-primary">Analyze Skin</button>
                </div>
            </div>

            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>Analyzing your skin... Please wait.</p>
            </div>

            <div id="results" class="hidden">
                <h2>Analysis Results</h2>
                <div class="result-item">
                    <span>Skin Type:</span>
                    <strong id="res-skin-type">-</strong>
                </div>
                <div class="result-item">
                    <span>Issues:</span>
                    <strong id="res-conditions">-</strong>
                </div>
                <div class="confidence-container">
                    <span>Confidence Score:</span>
                    <div class="progress-bar">
                        <div id="confidence-fill" class="fill"></div>
                    </div>
                    <span id="res-confidence">-</span>
                </div>
                <div id="tips-container" class="tips">
                    <h3>Recommended Tips</h3>
                    <p id="res-tips"></p>
                </div>
                <button id="reset-btn" class="btn-secondary">Scan Again</button>
            </div>
        </main>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
